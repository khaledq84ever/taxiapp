version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: taxiapp_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taxiapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: taxiapp_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: taxiapp_backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/taxiapp?schema=public
      JWT_SECRET: change-this-in-production
      NODE_ENV: development
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  postgres_data:
