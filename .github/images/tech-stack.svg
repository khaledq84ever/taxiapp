  <text x="90" y="133" font-family="Arial" font-size="10" fill="#888" text-anchor="middle">Backend API</text>
  <text x="90" y="150" font-family="Arial" font-size="10" fill="#888" text-anchor="middle">v10</text>

  <!-- React Native -->
  <rect x="165" y="55" width="130" height="110" rx="12" fill="#61DAFB" opacity="0.08" stroke="#61DAFB" stroke-width="1"/>
