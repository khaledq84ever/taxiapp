  </defs>
  <rect width="1000" height="200" fill="url(#bg4)" rx="16"/>

  <text x="500" y="36" font-family="Arial Black" font-size="16" fill="#FFD700" text-anchor="middle" font-weight="900">TECH STACK</text>

  <!-- Tech pills -->
