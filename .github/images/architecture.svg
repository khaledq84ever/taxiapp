<svg width="1000" height="600" viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FFD700" opacity="0.7"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#61DAFB" opacity="0.7"/>
    </marker>
  </defs>

  <rect width="1000" height="600" fill="url(#bg2)" rx="16"/>

  <!-- Title -->
  <text x="500" y="45" font-family="Arial Black" font-size="22" fill="#FFD700" text-anchor="middle" font-weight="900">SYSTEM ARCHITECTURE</text>
  <line x1="300" y1="55" x2="700" y2="55" stroke="#FFD700" stroke-width="1" opacity="0.3"/>

  <!-- MOBILE APP box -->
  <rect x="30" y="80" width="180" height="200" rx="12" fill="#1e2a4a" stroke="#61DAFB" stroke-width="1.5"/>
  <rect x="30" y="80" width="180" height="36" rx="12" fill="#61DAFB" opacity="0.2"/>
  <text x="120" y="104" font-family="Arial" font-size="13" fill="#61DAFB" text-anchor="middle" font-weight="bold">📱 MOBILE APP</text>
  <text x="120" y="130" font-family="Arial" font-size="11" fill="#aaaacc" text-anchor="middle">React Native + Expo</text>
  <text x="45" y="155" font-family="Arial" font-size="10" fill="#888">▸ Passenger Screens</text>
  <text x="45" y="173" font-family="Arial" font-size="10" fill="#888">▸ Driver Screens</text>
  <text x="45" y="191" font-family="Arial" font-size="10" fill="#888">▸ Redux Store</text>
  <text x="45" y="209" font-family="Arial" font-size="10" fill="#888">▸ Socket.io Client</text>
  <text x="45" y="227" font-family="Arial" font-size="10" fill="#888">▸ Google Maps</text>
  <text x="45" y="245" font-family="Arial" font-size="10" fill="#888">▸ Expo Location</text>

  <!-- ADMIN DASHBOARD box -->
  <rect x="30" y="310" width="180" height="160" rx="12" fill="#1e2a4a" stroke="#9C27B0" stroke-width="1.5"/>
  <rect x="30" y="310" width="180" height="36" rx="12" fill="#9C27B0" opacity="0.2"/>
  <text x="120" y="334" font-family="Arial" font-size="13" fill="#CE93D8" text-anchor="middle" font-weight="bold">🖥️ ADMIN PANEL</text>
  <text x="120" y="358" font-family="Arial" font-size="11" fill="#aaaacc" text-anchor="middle">React.js</text>
  <text x="45" y="383" font-family="Arial" font-size="10" fill="#888">▸ Dashboard Stats</text>
  <text x="45" y="401" font-family="Arial" font-size="10" fill="#888">▸ Driver Approvals</text>
  <text x="45" y="419" font-family="Arial" font-size="10" fill="#888">▸ Trip Management</text>
  <text x="45" y="437" font-family="Arial" font-size="10" fill="#888">▸ User Management</text>

  <!-- NESTJS BACKEND box -->
  <rect x="380" y="80" width="240" height="400" rx="12" fill="#1a2535" stroke="#FFD700" stroke-width="2"/>
  <rect x="380" y="80" width="240" height="40" rx="12" fill="#FFD700" opacity="0.15"/>
  <text x="500" y="107" font-family="Arial" font-size="14" fill="#FFD700" text-anchor="middle" font-weight="bold">⚙️ NESTJS BACKEND</text>

  <!-- Modules inside backend -->
  <rect x="395" y="132" width="100" height="32" rx="6" fill="#FFD700" opacity="0.12" stroke="#FFD700" stroke-width="0.8"/>
  <text x="445" y="153" font-family="Arial" font-size="10" fill="#FFD700" text-anchor="middle">Auth Module</text>

  <rect x="505" y="132" width="100" height="32" rx="6" fill="#4CAF50" opacity="0.12" stroke="#4CAF50" stroke-width="0.8"/>
  <text x="555" y="153" font-family="Arial" font-size="10" fill="#4CAF50" text-anchor="middle">Users Module</text>

  <rect x="395" y="175" width="100" height="32" rx="6" fill="#2196F3" opacity="0.12" stroke="#2196F3" stroke-width="0.8"/>
  <text x="445" y="196" font-family="Arial" font-size="10" fill="#2196F3" text-anchor="middle">Drivers Module</text>

  <rect x="505" y="175" width="100" height="32" rx="6" fill="#FF9800" opacity="0.12" stroke="#FF9800" stroke-width="0.8"/>
  <text x="555" y="196" font-family="Arial" font-size="10" fill="#FF9800" text-anchor="middle">Trips Module</text>

  <rect x="395" y="218" width="100" height="32" rx="6" fill="#E91E63" opacity="0.12" stroke="#E91E63" stroke-width="0.8"/>
  <text x="445" y="239" font-family="Arial" font-size="10" fill="#E91E63" text-anchor="middle">Payments</text>

  <rect x="505" y="218" width="100" height="32" rx="6" fill="#00BCD4" opacity="0.12" stroke="#00BCD4" stroke-width="0.8"/>
  <text x="555" y="239" font-family="Arial" font-size="10" fill="#00BCD4" text-anchor="middle">Ratings</text>

  <rect x="395" y="261" width="100" height="32" rx="6" fill="#8BC34A" opacity="0.12" stroke="#8BC34A" stroke-width="0.8"/>
  <text x="445" y="282" font-family="Arial" font-size="10" fill="#8BC34A" text-anchor="middle">Admin</text>

  <rect x="505" y="261" width="100" height="32" rx="6" fill="#FF5722" opacity="0.12" stroke="#FF5722" stroke-width="0.8"/>
  <text x="555" y="282" font-family="Arial" font-size="10" fill="#FF5722" text-anchor="middle">Socket Gateway</text>

  <line x1="395" y1="308" x2="605" y2="308" stroke="#FFD700" stroke-width="0.5" opacity="0.3"/>
  <text x="500" y="330" font-family="Arial" font-size="11" fill="#aaa" text-anchor="middle">JWT Auth · ValidationPipe</text>
  <text x="500" y="350" font-family="Arial" font-size="11" fill="#aaa" text-anchor="middle">CORS · Role Guards</text>
  <text x="500" y="370" font-family="Arial" font-size="11" fill="#aaa" text-anchor="middle">Haversine Distance Calc</text>
  <text x="500" y="390" font-family="Arial" font-size="11" fill="#aaa" text-anchor="middle">Fare Estimation Engine</text>
  <text x="500" y="410" font-family="Arial" font-size="11" fill="#aaa" text-anchor="middle">Real-time WS Events</text>
  <text x="500" y="430" font-family="Arial" font-size="11" fill="#aaa" text-anchor="middle">Prisma ORM</text>
  <text x="500" y="458" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">PORT 3000 · /api/v1</text>

  <!-- DATABASES box -->
  <rect x="790" y="80" width="175" height="200" rx="12" fill="#1e2a4a" stroke="#4CAF50" stroke-width="1.5"/>
  <rect x="790" y="80" width="175" height="36" rx="12" fill="#4CAF50" opacity="0.15"/>
  <text x="877" y="104" font-family="Arial" font-size="13" fill="#4CAF50" text-anchor="middle" font-weight="bold">🗄️ DATABASES</text>
  <text x="877" y="132" font-family="Arial" font-size="12" fill="#81C784" text-anchor="middle">PostgreSQL</text>
  <text x="805" y="153" font-family="Arial" font-size="10" fill="#888">▸ Users &amp; Drivers</text>
  <text x="805" y="170" font-family="Arial" font-size="10" fill="#888">▸ Trips &amp; Payments</text>
  <text x="805" y="187" font-family="Arial" font-size="10" fill="#888">▸ Ratings &amp; OTPs</text>
  <text x="805" y="204" font-family="Arial" font-size="10" fill="#888">▸ Notifications</text>
  <text x="877" y="228" font-family="Arial" font-size="12" fill="#FF7043" text-anchor="middle">Redis</text>
  <text x="805" y="248" font-family="Arial" font-size="10" fill="#888">▸ Sessions &amp; Cache</text>
  <text x="805" y="265" font-family="Arial" font-size="10" fill="#888">▸ Real-time State</text>

  <!-- SERVICES box -->
  <rect x="790" y="305" width="175" height="200" rx="12" fill="#1e2a4a" stroke="#FF9800" stroke-width="1.5"/>
  <rect x="790" y="305" width="175" height="36" rx="12" fill="#FF9800" opacity="0.15"/>
  <text x="877" y="329" font-family="Arial" font-size="13" fill="#FF9800" text-anchor="middle" font-weight="bold">🔌 SERVICES</text>
  <text x="805" y="360" font-family="Arial" font-size="10" fill="#888">▸ Twilio (OTP SMS)</text>
  <text x="805" y="378" font-family="Arial" font-size="10" fill="#888">▸ Stripe (Payments)</text>
  <text x="805" y="396" font-family="Arial" font-size="10" fill="#888">▸ Google Maps API</text>
  <text x="805" y="414" font-family="Arial" font-size="10" fill="#888">▸ Firebase FCM</text>
  <text x="805" y="432" font-family="Arial" font-size="10" fill="#888">▸ AWS S3 (Photos)</text>
  <text x="805" y="450" font-family="Arial" font-size="10" fill="#888">▸ Sentry (Errors)</text>
  <text x="805" y="468" font-family="Arial" font-size="10" fill="#888">▸ Railway (Hosting)</text>

  <!-- ARROWS: Mobile to Backend -->
  <line x1="210" y1="170" x2="378" y2="220" stroke="#61DAFB" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowBlue)" opacity="0.7"/>
  <text x="280" y="188" font-family="Arial" font-size="9" fill="#61DAFB" text-anchor="middle">REST + WS</text>

  <!-- ARROWS: Admin to Backend -->
  <line x1="210" y1="390" x2="378" y2="350" stroke="#CE93D8" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)" opacity="0.7"/>
  <text x="290" y="385" font-family="Arial" font-size="9" fill="#CE93D8" text-anchor="middle">REST API</text>

  <!-- ARROWS: Backend to DB -->
  <line x1="622" y1="180" x2="788" y2="180" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)" opacity="0.7"/>
  <text x="705" y="172" font-family="Arial" font-size="9" fill="#4CAF50" text-anchor="middle">Prisma ORM</text>

  <!-- ARROWS: Backend to Services -->
  <line x1="622" y1="360" x2="788" y2="390" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)" opacity="0.7"/>
  <text x="705" y="365" font-family="Arial" font-size="9" fill="#FF9800" text-anchor="middle">API Calls</text>

  <!-- Bottom label -->
  <text x="500" y="550" font-family="Arial" font-size="11" fill="#555" text-anchor="middle">TaxiApp — Production-Ready Architecture · Saudi Arabia Market</text>
</svg>
