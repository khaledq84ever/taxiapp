<svg width="1000" height="180" viewBox="0 0 1000 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#FFD700" opacity="0.8"/>
    </marker>
  </defs>
  <rect width="1000" height="180" fill="url(#bg5)" rx="16"/>

  <text x="500" y="30" font-family="Arial Black" font-size="16" fill="#FFD700" text-anchor="middle" font-weight="900">TRIP LIFECYCLE</text>

  <!-- Steps -->
  <rect x="20" y="55" width="110" height="70" rx="10" fill="#FFD700" opacity="0.12" stroke="#FFD700" stroke-width="1.5"/>
  <text x="75" y="83" font-size="20" text-anchor="middle">📍</text>
  <text x="75" y="102" font-family="Arial" font-size="11" fill="#FFD700" text-anchor="middle" font-weight="bold">REQUESTED</text>
  <text x="75" y="117" font-family="Arial" font-size="9" fill="#888" text-anchor="middle">Passenger books</text>

  <line x1="132" y1="90" x2="158" y2="90" stroke="#FFD700" stroke-width="1.5" marker-end="url(#arr2)" opacity="0.6"/>

  <rect x="160" y="55" width="110" height="70" rx="10" fill="#2196F3" opacity="0.12" stroke="#2196F3" stroke-width="1.5"/>
  <text x="215" y="83" font-size="20" text-anchor="middle">✅</text>
  <text x="215" y="102" font-family="Arial" font-size="11" fill="#2196F3" text-anchor="middle" font-weight="bold">ACCEPTED</text>
  <text x="215" y="117" font-family="Arial" font-size="9" fill="#888" text-anchor="middle">Driver accepts</text>

  <line x1="272" y1="90" x2="298" y2="90" stroke="#FFD700" stroke-width="1.5" marker-end="url(#arr2)" opacity="0.6"/>

  <rect x="300" y="55" width="120" height="70" rx="10" fill="#9C27B0" opacity="0.12" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="360" y="83" font-size="20" text-anchor="middle">🚗</text>
  <text x="360" y="100" font-family="Arial" font-size="11" fill="#CE93D8" text-anchor="middle" font-weight="bold">DRIVER</text>
  <text x="360" y="113" font-family="Arial" font-size="11" fill="#CE93D8" text-anchor="middle" font-weight="bold">ARRIVED</text>
  <text x="360" y="126" font-family="Arial" font-size="9" fill="#888" text-anchor="middle">At pickup point</text>

  <line x1="422" y1="90" x2="448" y2="90" stroke="#FFD700" stroke-width="1.5" marker-end="url(#arr2)" opacity="0.6"/>

  <rect x="450" y="55" width="120" height="70" rx="10" fill="#FF9800" opacity="0.12" stroke="#FF9800" stroke-width="1.5"/>
  <text x="510" y="83" font-size="20" text-anchor="middle">🏃</text>
  <text x="510" y="100" font-family="Arial" font-size="11" fill="#FF9800" text-anchor="middle" font-weight="bold">IN</text>
  <text x="510" y="113" font-family="Arial" font-size="11" fill="#FF9800" text-anchor="middle" font-weight="bold">PROGRESS</text>
  <text x="510" y="126" font-family="Arial" font-size="9" fill="#888" text-anchor="middle">Riding to dest.</text>

  <line x1="572" y1="90" x2="598" y2="90" stroke="#FFD700" stroke-width="1.5" marker-end="url(#arr2)" opacity="0.6"/>

  <rect x="600" y="55" width="120" height="70" rx="10" fill="#4CAF50" opacity="0.12" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="660" y="83" font-size="20" text-anchor="middle">🏁</text>
  <text x="660" y="102" font-family="Arial" font-size="11" fill="#4CAF50" text-anchor="middle" font-weight="bold">COMPLETED</text>
  <text x="660" y="117" font-family="Arial" font-size="9" fill="#888" text-anchor="middle">Fare calculated</text>

  <line x1="722" y1="90" x2="748" y2="90" stroke="#FFD700" stroke-width="1.5" marker-end="url(#arr2)" opacity="0.6"/>

  <rect x="750" y="55" width="110" height="70" rx="10" fill="#E91E63" opacity="0.12" stroke="#E91E63" stroke-width="1.5"/>
  <text x="805" y="83" font-size="20" text-anchor="middle">💳</text>
  <text x="805" y="102" font-family="Arial" font-size="11" fill="#E91E63" text-anchor="middle" font-weight="bold">PAYMENT</text>
  <text x="805" y="117" font-family="Arial" font-size="9" fill="#888" text-anchor="middle">Cash / Card</text>

  <line x1="862" y1="90" x2="888" y2="90" stroke="#FFD700" stroke-width="1.5" marker-end="url(#arr2)" opacity="0.6"/>

  <rect x="890" y="55" width="90" height="70" rx="10" fill="#FFD700" opacity="0.12" stroke="#FFD700" stroke-width="1.5"/>
  <text x="935" y="83" font-size="20" text-anchor="middle">⭐</text>
  <text x="935" y="102" font-family="Arial" font-size="11" fill="#FFD700" text-anchor="middle" font-weight="bold">RATING</text>
  <text x="935" y="117" font-family="Arial" font-size="9" fill="#888" text-anchor="middle">1-5 stars</text>

  <!-- Cancelled branch -->
  <text x="500" y="155" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">⚠️ Can be CANCELLED at REQUESTED or ACCEPTED stage by passenger or driver</text>
</svg>
