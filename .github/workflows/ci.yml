name: CI

# Build the NestJS backend on every push / PR so broken TypeScript is caught
# before a manual `railway up`. Build/test only — deploys stay manual.
on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Build (nest build)
        run: npm run build
